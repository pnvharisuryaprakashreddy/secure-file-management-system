<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - File Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="brand-badge">FM</div>
        <h2 id="authHeading">Secure File Manager</h2>
        <p class="login-subtitle" id="authSubtitle">Sign in to manage and organize your files.</p>

        <div class="auth-toggle-group">
            <button type="button" id="signInTab" class="auth-toggle active" onclick="switchAuthMode('signin')">Sign in</button>
            <button type="button" id="signUpTab" class="auth-toggle" onclick="switchAuthMode('signup')">Sign up</button>
        </div>

        <form id="loginForm" class="login-form">
            <div class="field-group">
                <input type="text" id="username" placeholder="Username" required />
            </div>
            <div class="field-group">
                <input type="password" id="password" placeholder="Password" required />
            </div>
            <div class="field-group" id="confirmGroup" style="display: none;">
                <input type="password" id="confirmPassword" placeholder="Confirm password" />
            </div>
            <button type="submit" id="authSubmitButton">Continue</button>
        </form>
        <p id="loginError" class="error-message"></p>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
